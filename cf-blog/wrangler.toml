name = "cf-blog"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 database — run `wrangler d1 create cf-blog-db` and paste the database_id below
[[d1_databases]]
binding = "DB"
database_name = "cf-blog-db"
database_id = "REPLACE_WITH_DATABASE_ID"

# R2 bucket — run `wrangler r2 bucket create cf-blog-assets` first
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cf-blog-assets"
